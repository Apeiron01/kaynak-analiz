<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Güvenlik Checkup | Kaynak Analiz</title>
  <meta name="description" content="Kısa soru-cevap ile temel dijital güvenlik skorunuzu ölçün." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <span class="brand-badge">KA</span>
        <span>Kaynak Analiz</span>
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="Menüyü aç">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Ana Sayfa</a>
        <a href="araclar.html">Ücretsiz Araçlar</a>
        <a href="iletisim.html">İletişim</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="section">
      <div class="container narrow">
        <div class="section-head fade-up">
          <p class="section-kicker">Ücretsiz araç</p>
          <h1 class="page-title">Güvenlik Checkup</h1>
          <p>
            Aşağıdaki kısa sorular, temel dijital güvenlik alışkanlıklarınız hakkında yön gösterici bir skor üretir.
          </p>
        </div>

        <form id="checkupForm" class="form-card fade-up delay-1">
          <div class="question">
            <label for="q1">1. Hesaplarınızda iki adımlı doğrulama kullanıyor musunuz?</label>
            <select id="q1" name="q1">
              <option value="0">Hayır</option>
              <option value="1">Bazılarında</option>
              <option value="2">Evet, çoğunda</option>
            </select>
          </div>

          <div class="question">
            <label for="q2">2. Aynı parolayı birden fazla yerde kullanıyor musunuz?</label>
            <select id="q2" name="q2">
              <option value="0">Evet</option>
              <option value="1">Bazen</option>
              <option value="2">Hayır</option>
            </select>
          </div>

          <div class="question">
            <label for="q3">3. Şüpheli linkleri tıklamadan önce kontrol eder misiniz?</label>
            <select id="q3" name="q3">
              <option value="0">Hayır</option>
              <option value="1">Bazen</option>
              <option value="2">Evet</option>
            </select>
          </div>

          <div class="question">
            <label for="q4">4. Acil ödeme, kargo veya banka mesajlarına karşı temkinli misiniz?</label>
            <select id="q4" name="q4">
              <option value="0">Hayır</option>
              <option value="1">Bazen</option>
              <option value="2">Evet</option>
            </select>
          </div>

          <div class="question">
            <label for="q5">5. Cihaz güncellemelerini düzenli yapar mısınız?</label>
            <select id="q5" name="q5">
              <option value="0">Hayır</option>
              <option value="1">Bazen</option>
              <option value="2">Evet</option>
            </select>
          </div>

          <div class="question">
            <label for="q6">6. Bilinmeyen QR kodlar ve kısa linklere karşı dikkatli misiniz?</label>
            <select id="q6" name="q6">
              <option value="0">Hayır</option>
              <option value="1">Bazen</option>
              <option value="2">Evet</option>
            </select>
          </div>

          <div class="question">
            <label for="q7">7. Mesajlarda görünen ad yerine gerçek kaynağı kontrol eder misiniz?</label>
            <select id="q7" name="q7">
              <option value="0">Hayır</option>
              <option value="1">Bazen</option>
              <option value="2">Evet</option>
            </select>
          </div>

          <div class="question">
            <label for="q8">8. Önemli hesaplarınız için farklı ve güçlü parolalar kullanıyor musunuz?</label>
            <select id="q8" name="q8">
              <option value="0">Hayır</option>
              <option value="1">Bazen</option>
              <option value="2">Evet</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary">Skorumu Hesapla</button>
        </form>

        <div id="checkupResult" class="result-card hidden fade-up"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Kaynak Analiz</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="checkup.js"></script>
</body>
</html>
