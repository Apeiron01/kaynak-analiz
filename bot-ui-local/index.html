<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina Bot Console</title>
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self'; script-src 'self'; connect-src http://localhost:* http://127.0.0.1:*; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel">
      <header class="chat-header">
        <div class="chat-title">
          <p class="eyebrow">Lumina</p>
          <h1>Bot Console</h1>
          <p class="chat-subtitle">Müşteri özelinde şekillenecek konuşma arayüzü ön izlemesi.</p>
        </div>
        <div class="status-pill" id="statusPill">Hazır</div>
      </header>

      <div class="chat-log" id="chatLog" aria-live="polite">
        <article class="message message-bot">
          <p class="message-meta">Bot</p>
          <p>Merhaba. Bu alan müşteri özelinde kurgulanacak bot deneyiminin sade ön yüzüdür.</p>
        </article>
      </div>

      <form class="composer" id="chatForm">
        <label class="composer-field" for="messageInput">Mesaj</label>
        <textarea
          id="messageInput"
          name="message"
          rows="4"
          placeholder="Mesajını yaz..."
          required
        ></textarea>
        <div class="composer-actions">
          <button class="ghost-btn" id="clearChatButton" type="button">Temizle</button>
          <button class="primary-btn" id="sendButton" type="submit">Gönder</button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
