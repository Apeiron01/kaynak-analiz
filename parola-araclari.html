<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parola Araçları | Kaynak Analiz</title>
  <meta name="description" content="Parola gücü ölçümü ve güçlü parola oluşturma aracı." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">Kaynak Analiz</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menüyü aç">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Ana Sayfa</a>
        <a href="araclar.html">Ücretsiz Araçlar</a>
        <a href="iletisim.html">İletişim</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="section">
      <div class="container narrow">
        <div class="section-head">
          <p class="section-kicker">Ücretsiz araç</p>
          <h1 class="page-title">Parola Araçları</h1>
          <p>
            Mevcut parolanızın gücünü ölçebilir veya yeni ve daha güçlü bir parola üretebilirsiniz.
          </p>
        </div>

        <div class="card-grid two">
          <div class="form-card">
            <h3>Parola Gücü Ölçer</h3>
            <label for="passwordInput">Parolanızı girin</label>
            <input id="passwordInput" type="text" placeholder="Parolanızı yazın" />
            <div class="meter">
              <div id="passwordMeterBar" class="meter-bar"></div>
            </div>
            <div id="passwordStrengthText" class="helper-text">Henüz analiz yapılmadı.</div>
          </div>

          <div class="form-card">
            <h3>Güçlü Parola Üretici</h3>
            <label for="passwordLength">Uzunluk</label>
            <input id="passwordLength" type="number" min="8" max="64" value="16" />

            <div class="checkbox-group">
              <label><input type="checkbox" id="includeUppercase" checked /> Büyük harf</label>
              <label><input type="checkbox" id="includeLowercase" checked /> Küçük harf</label>
              <label><input type="checkbox" id="includeNumbers" checked /> Rakam</label>
              <label><input type="checkbox" id="includeSymbols" checked /> Sembol</label>
            </div>

            <button id="generatePasswordBtn" class="btn btn-primary">Parola Üret</button>

            <input id="generatedPassword" type="text" readonly placeholder="Üretilen parola burada görünecek" />
            <button id="copyPasswordBtn" class="btn btn-secondary small-btn">Kopyala</button>
            <div id="copyStatus" class="helper-text"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Kaynak Analiz</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="password-tool.js"></script>
</body>
</html>
